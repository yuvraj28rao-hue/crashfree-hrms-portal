<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crashfree India · People OS — HR Prototype v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#4A35FF; --brand-90:#5a47ff; --brand-lite:#F3F1FF; --brand-lite2:#F8F7FF;
  --danger:#F10015; --warning:#F57C00; --success:#00AA44;
  --dark:#1a1c1c; --muted:#777589; --border:#EDEEF2; --bg:#FFFFFF;
  --heading:'Montserrat',sans-serif; --body:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --sidebar-w:252px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);color:var(--dark);background:#fbfbfd;font-size:14px;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5{font-family:var(--heading);letter-spacing:-0.01em}
::selection{background:var(--brand);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#e2e2ea;border-radius:20px;border:3px solid #fbfbfd}
a{color:inherit;text-decoration:none}

/* ---------- Layout ---------- */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.side-top{padding:18px 16px 10px}
.brand-row{display:flex;align-items:center;gap:9px;padding:4px 6px 14px}
.brand-mark{width:30px;height:30px;border-radius:9px;background:var(--brand);display:grid;place-items:center;color:#fff;flex-shrink:0}
.brand-mark svg{width:17px;height:17px}
.brand-name{font-family:var(--heading);font-weight:700;font-size:15px;line-height:1.05}
.brand-sub{font-size:10.5px;color:var(--muted);letter-spacing:.14em;font-weight:600;text-transform:uppercase}

.role-switch{margin:0 6px 8px;background:var(--brand-lite2);border:1px solid var(--border);border-radius:12px;padding:8px}
.role-switch label{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;font-family:var(--heading);display:block;margin:0 2px 6px}
.role-switch select{width:100%;border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 9px;font-family:var(--body);font-size:13px;font-weight:500;color:var(--dark);cursor:pointer}

.nav{flex:1;overflow-y:auto;padding:6px 10px 20px}
.nav-group{margin-top:14px}
.nav-group-title{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#a4a2b3;font-weight:700;font-family:var(--heading);padding:4px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;color:#4a4a57;font-weight:500;cursor:pointer;font-size:13.5px;position:relative;transition:background .12s,color .12s}
.nav-item svg{width:17px;height:17px;stroke-width:2;color:#8d8b9c;transition:color .12s}
.nav-item:hover{background:var(--brand-lite2)}
.nav-item.active{background:var(--brand-lite);color:var(--brand);font-weight:600}
.nav-item.active svg{color:var(--brand)}
.nav-item .badge{margin-left:auto;background:var(--brand);color:#fff;font-size:10.5px;font-weight:700;border-radius:20px;padding:1px 7px;font-family:var(--heading)}
.nav-item .badge.red{background:var(--danger)}
.side-foot{border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#4A35FF,#8b7bff);color:#fff;display:grid;place-items:center;font-family:var(--heading);font-weight:700;font-size:13px;flex-shrink:0}
.side-foot .who{line-height:1.2}
.side-foot .who b{font-size:13px;font-weight:600}
.side-foot .who span{font-size:11px;color:var(--muted)}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85);backdrop-filter:blur(8px);display:flex;align-items:center;gap:14px;padding:0 26px}
.crumb{font-size:12.5px;color:var(--muted);font-weight:500}
.crumb b{color:var(--dark);font-weight:600}
.search{margin-left:8px;flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:#f4f4f7;border:1px solid transparent;border-radius:999px;padding:8px 14px;color:var(--muted);cursor:text}
.search:focus-within{background:#fff;border-color:var(--brand)}
.search svg{width:15px;height:15px}
.search input{border:none;background:none;outline:none;flex:1;font-family:var(--body);font-size:13px;color:var(--dark)}
.search kbd{font-family:var(--heading);font-size:10px;background:#fff;border:1px solid var(--border);border-radius:5px;padding:2px 5px;color:var(--muted)}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:#fff;display:grid;place-items:center;cursor:pointer;color:#5c5a68;position:relative}
.icon-btn:hover{border-color:var(--brand);color:var(--brand)}
.icon-btn svg{width:17px;height:17px}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:2px solid #fff}
.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:999px;background:var(--brand);color:#fff;border:none;font-family:var(--body);font-weight:600;font-size:13px;cursor:pointer;box-shadow:0 6px 16px -6px rgba(74,53,255,.5)}
.btn:hover{background:var(--brand-90)}
.btn svg{width:15px;height:15px}
.btn.ghost{background:#fff;color:var(--dark);border:1px solid var(--border);box-shadow:none}
.btn.ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn.sm{height:32px;font-size:12px;padding:0 12px}

.content{flex:1;overflow-y:auto;padding:28px 32px 80px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Common bits ---------- */
.eyebrow{font-family:var(--heading);font-size:10.5px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--brand);display:inline-flex;align-items:center;gap:7px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:27px;font-weight:700;line-height:1.05;margin-top:8px}
.page-title .accent{color:var(--brand)}
.page-sub{color:var(--muted);font-size:13.5px;margin-top:7px;max-width:640px;line-height:1.5}
.head-actions{display:flex;gap:9px;align-items:center}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1150px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}

.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;transition:border-color .15s,box-shadow .15s}
.card.hover:hover{border-color:rgba(74,53,255,.4);box-shadow:0 10px 30px -18px rgba(74,53,255,.5)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-head h4{font-size:14.5px;font-weight:600}
.card-head .link{font-size:12px;color:var(--brand);font-weight:600;cursor:pointer}

.stat{display:flex;flex-direction:column;gap:2px}
.stat .ico{width:38px;height:38px;border-radius:11px;background:var(--brand-lite);color:var(--brand);display:grid;place-items:center;margin-bottom:12px}
.stat .ico svg{width:19px;height:19px}
.stat .num{font-family:var(--heading);font-weight:700;font-size:30px;line-height:1;color:var(--dark)}
.stat .lbl{color:var(--muted);font-size:12.5px;margin-top:6px}
.stat .delta{font-size:11.5px;font-weight:600;margin-top:8px;display:inline-flex;align-items:center;gap:4px}
.delta.up{color:var(--success)} .delta.down{color:var(--danger)} .delta.flat{color:var(--muted)}
.delta svg{width:13px;height:13px}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;font-family:var(--body)}
.pill svg{width:11px;height:11px}
.pill.blue{background:var(--brand-lite);color:var(--brand)}
.pill.green{background:#e4f7ec;color:var(--success)}
.pill.orange{background:#fff1e2;color:var(--warning)}
.pill.red{background:#ffe8ea;color:var(--danger)}
.pill.grey{background:#f0f0f4;color:var(--muted)}
.dot-s{width:7px;height:7px;border-radius:50%;display:inline-block}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-family:var(--heading);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 14px 12px}
td{padding:13px 14px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr.row:hover td{background:var(--brand-lite2);cursor:pointer}
.cell-user{display:flex;align-items:center;gap:10px}
.cell-user .avatar{width:30px;height:30px;font-size:11px}
.cell-user b{font-weight:600;font-size:13px}
.cell-user span{font-size:11.5px;color:var(--muted)}

.list-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--border)}
.list-row:first-child{border-top:none}
.mini-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.mini-ico svg{width:16px;height:16px}

.progress{height:7px;border-radius:20px;background:#eeeef3;overflow:hidden}
.progress i{display:block;height:100%;border-radius:20px;background:var(--brand)}

/* Workflow */
.flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 2px 14px}
.flow-step{min-width:150px;flex:1;background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;position:relative}
.flow-step + .flow-step{margin-left:26px}
.flow-step:not(:last-child)::after{content:"";position:absolute;right:-22px;top:50%;width:18px;height:2px;background:var(--border)}
.flow-step:not(:last-child)::before{content:"";position:absolute;right:-24px;top:50%;transform:translateY(-50%);border-left:6px solid var(--border);border-top:5px solid transparent;border-bottom:5px solid transparent;z-index:2}
.flow-step.done{border-color:var(--success)}
.flow-step.active{border-color:var(--brand);box-shadow:0 8px 22px -14px rgba(74,53,255,.6)}
.flow-step .st{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--heading)}
.flow-step h5{font-size:13px;font-weight:600;margin:6px 0 4px}
.flow-step p{font-size:11.5px;color:var(--muted)}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:1150px){.kanban{grid-template-columns:repeat(2,1fr)}}
.kcol{background:#f6f6f9;border-radius:14px;padding:12px}
.kcol h5{font-size:12px;font-weight:700;font-family:var(--heading);letter-spacing:.06em;text-transform:uppercase;color:#5c5a68;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kcol h5 span{background:#fff;color:var(--muted);border-radius:20px;padding:1px 8px;font-size:10.5px}
.kcard{background:#fff;border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:9px;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.kcard:hover{border-color:rgba(74,53,255,.4)}
.kcard b{font-size:12.5px;font-weight:600;display:block}
.kcard .meta{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px}

/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dh{font-family:var(--heading);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;text-align:center;padding-bottom:4px}
.cal .cell{aspect-ratio:1.15;border:1px solid var(--border);border-radius:9px;padding:7px;font-size:12px;font-weight:600;position:relative;color:#4a4a57}
.cal .cell.muted{color:#c8c7d2;background:#fafafc}
.cal .cell .tag{position:absolute;bottom:6px;left:6px;right:6px;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:5px;padding:2px 4px;text-align:center}
.cal .cell.p .tag{background:#e4f7ec;color:var(--success)}
.cal .cell.wfh .tag{background:var(--brand-lite);color:var(--brand)}
.cal .cell.leave .tag{background:#fff1e2;color:var(--warning)}
.cal .cell.hol{background:#ffe8ea}
.cal .cell.hol .tag{background:#ffdadd;color:var(--danger)}
.cal .cell.today{border-color:var(--brand);border-width:2px}

/* Bars */
.bars{display:flex;align-items:flex-end;gap:14px;height:150px;padding-top:10px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar .b{width:100%;max-width:40px;border-radius:7px 7px 0 0;background:var(--brand)}
.bar .b.lite{background:#c9c1ff}
.bar small{font-size:10.5px;color:var(--muted);font-family:var(--heading);font-weight:600}

/* Timeline */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;padding:0 0 18px}
.tl-item::before{content:"";position:absolute;left:-22px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--brand)}
.tl-item.grey::before{border-color:#c8c7d2}
.tl-item b{font-size:13px;font-weight:600}
.tl-item .t{font-size:11px;color:var(--muted)}
.tl-item p{font-size:12.5px;color:#5c5a68;margin-top:3px}

/* Profile */
.pf-head{display:flex;gap:20px;align-items:center}
.pf-avatar{width:82px;height:82px;border-radius:20px;background:linear-gradient(135deg,#4A35FF,#8b7bff);color:#fff;display:grid;place-items:center;font-family:var(--heading);font-weight:700;font-size:30px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:22px 0 20px;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--brand);border-color:var(--brand)}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:16px 26px}
.kv .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-family:var(--heading);font-weight:700;margin-bottom:3px}
.kv .v{font-size:13.5px;font-weight:500}

/* AI */
.ai-wrap{max-width:840px;margin:0 auto}
.ai-msg{display:flex;gap:12px;margin-bottom:20px}
.ai-msg .a{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center}
.ai-msg.bot .a{background:var(--brand);color:#fff}
.ai-msg.me .a{background:#eceaff;color:var(--brand)}
.ai-msg .bub{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:13.5px;line-height:1.6}
.ai-msg.me .bub{background:var(--brand-lite);border-color:transparent}
.ai-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{border:1px solid var(--border);background:#fff;border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:500;cursor:pointer;color:#4a4a57}
.chip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-lite2)}
.ai-input{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:16px;padding:10px 12px 10px 16px;margin-top:8px}
.ai-input input{flex:1;border:none;outline:none;font-family:var(--body);font-size:13.5px}

.callout{display:flex;gap:12px;background:var(--brand-lite);border:1px solid #ddd6ff;border-radius:14px;padding:14px 16px;font-size:13px;line-height:1.5}
.callout svg{width:18px;height:18px;color:var(--brand);flex-shrink:0;margin-top:1px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:0 16px 40px -12px rgba(0,0,0,.5);z-index:99;opacity:0;transition:all .3s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{width:16px;height:16px;color:#7dffb0}

.section-title{font-size:15px;font-weight:700;font-family:var(--heading);margin:26px 0 14px;display:flex;align-items:center;gap:8px}
.section-title svg{width:17px;height:17px;color:var(--brand)}
.hr-note{font-size:12px;color:var(--muted);margin-top:4px}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:1050px){.two-col{grid-template-columns:1fr}}
.doc-tile{border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;gap:11px;align-items:flex-start;cursor:pointer}
.doc-tile:hover{border-color:var(--brand);background:var(--brand-lite2)}
.doc-tile .di{width:36px;height:36px;border-radius:9px;background:var(--brand-lite);color:var(--brand);display:grid;place-items:center;flex-shrink:0}
.doc-tile .di svg{width:17px;height:17px}
.doc-tile b{font-size:13px;font-weight:600}
.doc-tile span{font-size:11px;color:var(--muted)}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:30px}

:where(svg.ic){width:16px;height:16px}
svg.ic{flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="side-top">
      <div class="brand-row">
        <div class="brand-mark"><i data-lucide="shield-check"></i></div>
        <div>
          <div class="brand-name">People OS</div>
          <div class="brand-sub">Crashfree India · v2</div>
        </div>
      </div>
      <div class="role-switch">
        <label>Viewing as</label>
        <select id="roleSelect" onchange="setRole(this.value)">
          <option value="hr">HR Head — Priya Nair</option>
          <option value="manager">Manager — Rohan Das</option>
          <option value="employee">Employee — Aditya Rao</option>
          <option value="founder">Founder — Vikram Mehta</option>
        </select>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="avatar" id="footAvatar">PN</div>
      <div class="who"><b id="footName">Priya Nair</b><br><span id="footRole">Head of People</span></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="crumb">People OS <b id="crumb">/ Home</b></div>
      <div class="search"><i data-lucide="search"></i><input placeholder="Search people, letters, tickets, policies…"><kbd>⌘K</kbd></div>
      <div class="top-actions">
        <button class="icon-btn" onclick="go('ai')" title="Ask Aria (AI)"><i data-lucide="sparkles"></i></button>
        <button class="icon-btn" title="Notifications"><i data-lucide="bell"></i><span class="dot"></span></button>
        <button class="btn" onclick="openCreate()"><i data-lucide="plus"></i> Create</button>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
/* ================= NAV CONFIG ================= */
const NAV = [
  {group:"Overview", items:[
    {id:"dashboard", label:"Home", icon:"layout-dashboard"},
    {id:"people", label:"People", icon:"users", badge:"142"},
    {id:"workflows", label:"Workflows", icon:"git-branch", badge:"7"},
    {id:"helpdesk", label:"Helpdesk", icon:"life-buoy", badge:"12", red:true},
  ]},
  {group:"Time & Attendance", items:[
    {id:"attendance", label:"Attendance", icon:"clock"},
    {id:"leave", label:"Leave", icon:"palmtree"},
    {id:"wfh", label:"Work From Home", icon:"house"},
  ]},
  {group:"Lifecycle", items:[
    {id:"recruitment", label:"Recruitment", icon:"user-plus", badge:"23"},
    {id:"documents", label:"Document Center", icon:"file-text"},
    {id:"payroll", label:"Salary & Payroll", icon:"indian-rupee"},
    {id:"performance", label:"Performance", icon:"target"},
    {id:"assets", label:"Assets", icon:"laptop"},
    {id:"insurance", label:"Insurance", icon:"heart-pulse"},
  ]},
  {group:"Company", items:[
    {id:"announcements", label:"Announcements", icon:"megaphone"},
    {id:"analytics", label:"Analytics", icon:"bar-chart-3"},
    {id:"ai", label:"Aria — AI Assistant", icon:"sparkles"},
    {id:"roles", label:"Roles & Access", icon:"shield"},
  ]},
];

const ROLES = {
  hr:{name:"Priya Nair", role:"Head of People", initials:"PN"},
  manager:{name:"Rohan Das", role:"Engineering Manager", initials:"RD"},
  employee:{name:"Aditya Rao", role:"Product Designer", initials:"AR"},
  founder:{name:"Vikram Mehta", role:"Founder & CEO", initials:"VM"},
};
let currentRole = "hr";

/* ================= HELPERS ================= */
const $ = s => document.querySelector(s);
function icon(n){return `<i data-lucide="${n}"></i>`;}
function refreshIcons(){ renderIcons(); }
function toast(msg){ $("#toastMsg").textContent=msg; const t=$("#toast"); t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function avatar(initials,cls=""){return `<div class="avatar ${cls}">${initials}</div>`;}

/* ================= ROUTER ================= */
function buildNav(){
  const el=$("#nav"); el.innerHTML="";
  NAV.forEach(g=>{
    const grp=document.createElement("div"); grp.className="nav-group";
    grp.innerHTML=`<div class="nav-group-title">${g.group}</div>`;
    g.items.forEach(it=>{
      const a=document.createElement("div"); a.className="nav-item"; a.dataset.id=it.id;
      a.onclick=()=>go(it.id);
      a.innerHTML=`${icon(it.icon)}<span>${it.label}</span>${it.badge?`<span class="badge ${it.red?'red':''}">${it.badge}</span>`:""}`;
      grp.appendChild(a);
    });
    el.appendChild(grp);
  });
  refreshIcons();
}
function go(id){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.id===id));
  const label = NAV.flatMap(g=>g.items).find(i=>i.id===id)?.label || "Home";
  $("#crumb").textContent="/ "+label;
  const c=$("#content");
  c.innerHTML = (VIEWS[id]?VIEWS[id]():`<div class="empty">Coming soon</div>`);
  c.scrollTop=0;
  refreshIcons();
}
function setRole(r){
  currentRole=r; const u=ROLES[r];
  $("#footName").textContent=u.name; $("#footRole").textContent=u.role; $("#footAvatar").textContent=u.initials;
  go("dashboard");
  toast("Now viewing as "+u.role);
}
function openCreate(){ toast("Quick create — letter, ticket, workflow, job or announcement"); go("workflows"); }

/* ================= SHARED UI ================= */
function head(eyebrow,title,accent,sub,actions=""){
  return `<div class="page-head"><div>
    <div class="eyebrow">${icon("dot")}${eyebrow}</div>
    <h1 class="page-title">${title} ${accent?`<span class="accent">${accent}</span>`:""}</h1>
    ${sub?`<p class="page-sub">${sub}</p>`:""}
  </div><div class="head-actions">${actions}</div></div>`;
}
function stat(ico,num,lbl,delta,dir){
  return `<div class="card hover stat"><div class="ico">${icon(ico)}</div>
    <div class="num">${num}</div><div class="lbl">${lbl}</div>
    ${delta?`<div class="delta ${dir}">${icon(dir==='up'?'trending-up':dir==='down'?'trending-down':'minus')} ${delta}</div>`:""}</div>`;
}
function pill(txt,cls){return `<span class="pill ${cls}">${txt}</span>`;}

/* ================= VIEWS ================= */
const VIEWS = {};
</script>

function calendarHTML(){

  const map={5:'leave',12:'wfh',13:'wfh',14:'today p',15:'p',18:'wfh',19:'wfh',26:'hol'};
  const tagT={p:'P',wfh:'WFH',leave:'Leave',hol:'Holiday','today p':'Today'};
  for(let d=1;d<=31;d++){ const dow=(d+1)%7; let cls=map[d]||''; let base=cls.includes('wfh')?'wfh':cls.includes('leave')?'leave':cls.includes('hol')?'hol':cls.includes('p')?'p':'';
    const tag = cls? `<div class="tag">${cls.includes('today')?'Today':tagT[base]||''}</div>`:''; if([0,6].includes(dow)&&!cls){cls='muted';}
    cells+=`<div class="cell ${cls}">${d}${tag}</div>`; }
  return `<div class="cal">${days.map(d=>`<div class="dh">${d}</div>`).join("")}${cells}</div>`;
}

function aiAsk(t){$("#aiIn").value=t; aiSend();}
function aiSend(){const v=$("#aiIn").value.trim()||"Draft 3 confirmation letters"; const wrap=document.querySelector(".ai-wrap");
  const chips=document.querySelector(".ai-chips"); const input=document.querySelector(".ai-input");
  const me=document.createElement("div"); me.className="ai-msg me"; me.innerHTML=`<div class="a">${icon("user")}</div><div class="bub">${v}</div>`;
  wrap.insertBefore(me,chips);
  const bot=document.createElement("div"); bot.className="ai-msg bot"; bot.innerHTML=`<div class="a">${icon("sparkles")}</div><div class="bub">Working on it… I've drafted this for your review. Nothing is finalised until you approve. Want me to route it through the right workflow?</div>`;
  setTimeout(()=>{wrap.insertBefore(bot,chips); refreshIcons(); wrap.parentElement.scrollTop=wrap.parentElement.scrollHeight;},250);
  $("#aiIn").value=""; refreshIcons();
}

/* ---------- ROLES & ACCESS ---------- */
VIEWS.roles=function(){
  const roles=[["Employee","Self-service: attendance, leave, WFH, payslips, letters, tickets, profile."],["Manager","Employee + team approvals, availability, reviews, team analytics."],["HR","Full people ops: all modules, workflows, documents, helpdesk, config."],["Finance","Payroll, reimbursements, claims, comp reports, revision approvals."],["Founder","Company-wide read + sign-off on offers, promotions, comp cycles."],["Admin","System config, roles, templates, integrations, audit logs."]];
  return head("Governance","Roles","& access.","Six roles, clear permissions. HR configures everything — no code, fully auditable.")
  + `<div class="grid g3">${roles.map(r=>`<div class="card hover"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="mini-ico" style="background:var(--brand-lite);color:var(--brand)">${icon("shield")}</div><h4 style="font-size:15px;font-weight:700">${r[0]}</h4></div><p style="font-size:12.5px;color:var(--muted);line-height:1.55">${r[1]}</p></div>`).join("")}</div>
     <div class="section-title">${icon("key-round")} Permission matrix</div>
     <div class="card" style="overflow-x:auto"><table><thead><tr><th>Module</th><th>Employee</th><th>Manager</th><th>HR</th><th>Finance</th><th>Founder</th></tr></thead><tbody>
       ${permRow("Own profile & payslips",["edit","edit","edit","view","view"])}
       ${permRow("Team approvals",["—","edit","edit","—","view"])}
       ${permRow("All people data",["—","team","edit","view","view"])}
       ${permRow("Payroll & comp",["—","—","view","edit","approve"])}
       ${permRow("Documents & letters",["own","team","edit","view","view"])}
       ${permRow("Workflows config",["—","—","edit","—","view"])}
     </tbody></table></div>`;
};
function permRow(mod,perms){const map={edit:['green','Full'],view:['blue','View'],approve:['blue','Approve'],team:['orange','Team'],own:['orange','Own'],'—':['grey','—']};
  return `<tr><td style="font-weight:600">${mod}</td>${perms.map(p=>`<td>${pill(map[p][1],map[p][0])}</td>`).join("")}</tr>`;}

/* ================= INIT ================= */
buildNav();
go("dashboard");
</script>
